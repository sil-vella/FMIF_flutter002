name: FMIF
description: Example project for demoing banner ads.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: ^5.2.0
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_native_splash: ^2.4.1
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/animations/after_animations/
    - assets/animations/after_animations/correct_anim/
    - assets/animations/after_animations/incorrect_anim/
    - assets/animations/correct_background_anims/
    - assets/audio/
    - assets/config/
    - assets/images/

flutter_native_splash:
  color: "#ffffff" # Background color of the splash screen
  image: assets/images/splash.jpg # Path to your splash screen image
  android: true # Enable for Android
  ios: true # Enable for iOS
  web: false # Set to true if you want a web splash screen
  android_gravity: fill # Ensures the image fills the screen on Android
  ios_content_mode: scaleToFill # Ensures the image fills the screen on iOS

